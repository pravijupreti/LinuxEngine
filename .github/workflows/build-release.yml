name: Build and Release

on:
  push:
    tags:
      - 'v*'

# Add these permissions
permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write  # Important for creating releases
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller PyQt5
    
    - name: Build
      run: |
        pyinstaller --onefile \
          --name jupyter_manager \
          --add-data "scripts:scripts" \
          --add-data "polkit_setup.py:." \
          --collect-all PyQt5 \
          jupyter_manager.py
    
    - name: Package
      run: |
        cd dist
        tar -czf jupyter_manager_linux_amd64.tar.gz jupyter_manager
        zip jupyter_manager_linux_amd64.zip jupyter_manager
        sha256sum *.tar.gz *.zip > checksums.txt
    
    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}